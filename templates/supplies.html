{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Supplies</h2>
    <a class="btn btn-primary mb-2" href="{{ url_for('add_supply') }}">Add Supply</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Assigned Center</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for s in supplies %}
            <tr>
                <td>{{ s.id }}</td>
                <td>{{ s.item_name }}</td>
                <td>{{ s.quantity }}</td>
                <td>{{ s.center_name or 'Unassigned' }}</td>
                <td>
                    <a href="{{ url_for('edit_supply', supply_id=s.id) }}" class="btn btn-warning btn-sm">Edit</a>
                    <button class="btn btn-danger btn-sm delete-btn" data-id="{{ s.id }}">Delete</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script>
document.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        if(confirm("Are you sure?")){
            fetch('{{ url_for("delete_supply") }}',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({id:btn.dataset.id})
            }).then(()=> location.reload())
        }
    })
})
</script>
{% endblock %}
