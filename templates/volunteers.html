{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Volunteers</h2>
    <a href="{{ url_for('add_volunteer') }}" class="btn btn-primary mb-3">Add Volunteer</a>
    <table class="table table-bordered table-hover">
        <thead class="thead-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Skills</th>
                <th>Availability</th>
                <th>Assigned Center</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for v in volunteers %}
            <tr>
                <td>{{ v.id }}</td>
                <td>{{ v.name }}</td>
                <td>{{ v.skills }}</td>
                <td>{{ v.availability }}</td>
                <td>{{ v.center_name or 'Unassigned' }}</td>
                <td>
                    <a href="{{ url_for('edit_volunteer', volunteer_id=v.id) }}" class="btn btn-warning btn-sm">Edit</a>
                    <button class="btn btn-danger btn-sm delete-btn" data-id="{{ v.id }}">Delete</button>
                    <a href="{{ url_for('assign_task', volunteer_id=v.id) }}" class="btn btn-success btn-sm">Assign Task</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
document.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        if(confirm("Are you sure you want to delete this volunteer?")) {
            fetch('{{ url_for("delete_volunteer") }}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: btn.dataset.id})
            }).then(res => res.json())
              .then(data => {
                  if(data.status === 'success'){
                      location.reload();
                  } else {
                      alert("Error deleting volunteer: " + data.message);
                  }
              })
        }
    })
});
</script>
{% endblock %}
